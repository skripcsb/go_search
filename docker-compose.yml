services:
  nats:
    image: nats:2.10-alpine
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  app:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      NATS_URL: "nats://nats:4222"
      NATS_SUBJECT: "search.queries"
      NATS_QUEUE: "searchtrends"
    ports:
      - "8080:8080"
    depends_on:
      - nats